<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center text-primary mb-4">Edit Your Profile</h3>
                    <form method="POST" action="/edit_profile" enctype="multipart/form-data">
                        <div class="mb-3 text-center">
                            {% if user.photo %}
                            <img src="{{ url_for('static', filename=user.photo) }}" alt="Profile Photo" class="rounded-circle mb-2" style="width: 90px; height: 90px; object-fit: cover; border: 2px solid #c58940;">
                            {% else %}
                            <img src="{{ url_for('static', filename='images/default-profile.png') }}" alt="Default Photo" class="rounded-circle mb-2" style="width: 90px; height: 90px; object-fit: cover; border: 2px solid #c58940;">
                            {% endif %}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Profile Photo:</label>
                            <input type="file" name="photo" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Name:</label>
                            <input type="text" name="name" class="form-control" value="{{ user.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email:</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number:</label>
                            <input type="text" name="mobile" class="form-control" value="{{ user.mobile }}" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Update</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
